name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Swift build
        run: swift build

      - name: Swift test
        run: swift test

      - name: Build macOS app bundle
        run: ./scripts/build_app.sh
